#
#   Refer for explanation to following link:
#   https://lefthook.dev/configuration/
#
pre-commit:
  # Sequential: 01 must complete before 02 so package.json is sorted before biome checks it.
  parallel: false
  commands:
    01-sort-package-json:
      # Only runs when package.json is among the staged files.
      glob: "package.json"
      run: |
        pnpm run format:package-json
        git add package.json

    02-biomejs-check:
      # {staged_files} — lefthook provides all staged files as arguments automatically.
      # If no files are staged, lefthook skips this command entirely.
      #
      # Biome self-filters unknown file types via "ignoreUnknown": true in biome.jsonc,
      # so no extension allowlist is needed here — new formats biome supports in the future
      # are picked up automatically.
      #
      # Step 1 --write {staged_files}: auto-fixes safe issues on staged files only
      # Step 2 check . --error-on-warnings:
      #                             verifies the ENTIRE repo — no file may have errors or
      #                             warnings. Biome is fast enough (~17ms for 136 files)
      #                             that a full scan costs nothing.
      #                             --error-on-warnings: biome check exits 0 for warnings
      #                             by default; this flag makes warnings exit with code 1.
      # --no-errors-on-unmatched:   exits cleanly when all staged files are ignored by biome
      #                             (e.g. committing only .yml or .sh files)
      # stage_fixed: true:          lefthook re-stages ONLY files that biome actually modified,
      #                             which correctly handles `git add -p` partial staging
      run: >
        pnpm exec biome check --write --no-errors-on-unmatched {staged_files} &&
        pnpm exec biome check --error-on-warnings .
      stage_fixed: true
