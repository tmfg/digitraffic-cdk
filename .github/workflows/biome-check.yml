name: Biome Check

on:
  workflow_dispatch:
  push:

permissions:
  contents: read

jobs:
  biome:
    name: Biome Lint & Format
    if: github.repository != 'tmfg/digitraffic-cdk'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2.7.1
        with:
          # Auto-detect version from rush-command-line-tools/package.json so CI
          # matches the workspace-pinned Biome instead of drifting with "latest".
          working-dir: common/autoinstallers/rush-command-line-tools
      - name: Run Biome
        run: biome ci --reporter=github --no-errors-on-unmatched .
